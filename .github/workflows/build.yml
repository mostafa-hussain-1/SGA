name: Windows Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.5.0'
        host: 'windows'
        target: 'desktop'
        arch: 'win64_mingw'
        modules: 'qtcharts' # ضفنا السطر ده عشان ينزل مكتبة الرسومات

    - name: Build with CMake
      run: |
        mkdir build_ci
        cd build_ci
        cmake -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release .. # أجبرناه يستخدم MinGW
        cmake --build . --config Release

    - name: Run windeployqt
      run: |
        cd build_ci
        windeployqt --no-translations SGAPlus.exe

    - name: Upload Application
      uses: actions/upload-artifact@v4
      with:
        name: SGA_App_Windows
        path: build_ci/
